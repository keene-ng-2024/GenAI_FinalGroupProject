# ── Model configuration ────────────────────────────────────────────────────────
models:
  strong: "gpt-4o"                  # used for agentic loop & critique-dict building
  fast:   "gpt-4o"                  # used for cheap sub-calls (summarise, verify)
  baseline: "gpt-4o"                # OpenAI 4o baseline

# ── Reproducibility ────────────────────────────────────────────────────────────
seed: 42
temperature: 0.2
max_tokens: 4096

# ── Data ───────────────────────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  jsonl_file: "data/ReviewCritique.jsonl"
  processed_dir: "data/processed"
  reviews_file: "data/processed/reviews_parsed.json"
  critique_dicts_dir: "data/processed/critique_dicts"

# ── Critique-dict building ─────────────────────────────────────────────────────
critique_dict:
  min_points: 3
  max_points: 15
  similarity_threshold: 0.85   # cosine sim above which two points are merged

# ── Agentic loop ───────────────────────────────────────────────────────────────
agent:
  max_rounds: 3                # debate rounds between Critic and Auditor
  truncate_body_chars: 12000   # truncate full paper text fed to Reader
  use_tools: true              # toggle tool-use for Critic/Auditor (false for ablation)
  max_tool_calls: 5            # hard cap on tool calls per agent turn
  early_stop_phrases:
    - "no further concerns"
    - "i am satisfied"
    - "well-supported"
    - "approve"
  model_map:
    reader: "gpt-4o"     # OpenAI 4o for reading
    critic: "gpt-4o"     # OpenAI 4o for critique
    auditor: "gpt-4o"    # OpenAI 4o for auditing
    summariser: "gpt-4o" # OpenAI 4o for summarization
  roles:
    - Reader
    - Critic
    - Auditor
    - Summariser

# ── Evaluation ─────────────────────────────────────────────────────────────────
evaluation:
  similarity_threshold: 0.50   # cosine sim to count a point as "covered" (lower for long-form critiques)
  embedding_model: "all-MiniLM-L6-v2"

# ── n8n platform ───────────────────────────────────────────────────────────────
n8n:
  webhook_url: "http://localhost:5678/webhook/paper-critique"  # update if using cloud n8n
  # models used inside the n8n workflow (OpenRouter format)
  reader_model: "google/gemini-flash-1.5"
  critic_model: "google/gemini-pro-1.5"
  auditor_model: "google/gemini-flash-1.5"
  summariser_model: "google/gemini-pro-1.5"

# ── Vertex AI platform ─────────────────────────────────────────────────────────
vertex_ai:
  project: "genai-vertexai-492302"      # GCP project ID
  location: "us-central1"              # must be a real region, not "global"
  # models used in Vertex AI (Gemini 2.5 — GA, lowest cost)
  reader_model: "gemini-2.5-flash-lite"   # cheapest GA model
  critic_model: "gemini-2.5-flash"        # balanced quality/cost
  auditor_model: "gemini-2.5-flash-lite"  # cheapest GA model
  summariser_model: "gemini-2.5-flash"    # balanced quality/cost
  # grounding verifier settings
  grounding_verifier:
    model: "gemini-2.5-flash-lite"
    max_tokens: 1024
    early_stop_phrases:
      - "no further concerns"
      - "i am satisfied"
      - "well-supported"
      - "approve"

# ── Results ────────────────────────────────────────────────────────────────────
results:
  baseline_dir: "results/baseline"
  agents_dir: "results/agents"
  vertexai_dir: "results/vertexai"
  n8n_dir: "results/n8n"
